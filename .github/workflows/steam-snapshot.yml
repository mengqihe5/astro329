name: Steam Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Sync steam snapshot
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: ${{ secrets.STEAM_ID }}
        run: npm run steam:snapshot

      - name: Commit changed snapshot files
        run: |
          if [[ -z "$(git status --porcelain content/steam/daily_totals.json content/steam/monthly_hours.json)" ]]; then
            echo "No snapshot changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/steam/daily_totals.json content/steam/monthly_hours.json
          git commit -m "chore: update steam snapshots"
          git push

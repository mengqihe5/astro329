{% load static %}
<h4>{{ selected_day_label }}</h4>
<div class="day-article-grid">
    {% for article in calendar_articles %}
        <a href="{% url 'article_detail' article.slug %}" class="card card-link day-article-card">
            <div class="day-article-thumb">
                <img src="{% static article.cover %}" alt="{{ article.title }} cover">
            </div>
            <div class="day-article-content">
                <h3>{{ article.title }}</h3>
            </div>
        </a>
    {% empty %}
        <p class="meta">No articles on this date.</p>
    {% endfor %}
</div>

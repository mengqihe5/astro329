{% extends "base.html" %}

{% block title %}{{ book.title }} 读后感{% endblock %}

{% block content %}
<section class="page-head">
    <a class="text-link" href="{% url 'bookshelf' %}">返回书架</a>
</section>
<article class="card article-full">
    <h2>{{ book.title }}</h2>
    <p class="meta">{{ book.month_label }}</p>
    <pre class="md-view">{{ review_text }}</pre>
</article>
{% endblock %}
